# Codecov configuration for the Bun baseline.
#
# Unit and integration coverage are uploaded under separate flags (via the
# codecov/codecov-action steps in .github/workflows/⚡reusable-test-unit.yaml
# and ⚡reusable-test-int.yaml) so downstream templates can tune thresholds per
# suite. Upload is best-effort in CI — the BLOCKING gate is the
# local test/coverage run, so statuses here are informational and never fail a
# PR on their own. Downstream templates flip `informational: false` and raise
# `target` once they have a baseline.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        informational: true

flags:
  unit:
    paths:
      - src/
    carryforward: true
  int:
    paths:
      - src/
    carryforward: true

comment:
  layout: 'reach, diff, flags, files'
  require_changes: false
