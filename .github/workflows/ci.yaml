name: CI
on:
  push: null
jobs:
  precommit:
    name: Lint & Pre-Commit
    uses: ./.github/workflows/⚡reusable-precommit.yaml
  unit:
    name: Unit Tests
    uses: ./.github/workflows/⚡reusable-test-unit.yaml
  int:
    name: Integration Tests
    uses: ./.github/workflows/⚡reusable-test-int.yaml
  build:
    name: Build Validation
    uses: ./.github/workflows/⚡reusable-build.yaml
  docker:
    name: Docker Image
    uses: ./.github/workflows/⚡reusable-docker.yaml
    with:
      image_name: diene-bun-base
      dockerfile: ./infra/Dockerfile
