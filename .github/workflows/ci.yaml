name: CI

on:
  - push

jobs:
  precommit:
    name: Lint & Pre-Commit
    runs-on: ubuntu-22.04
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - name: Run pre-commit
        run: nix develop .#ci -c ./scripts/ci/pre-commit.sh

  unit:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - name: Run unit tests
        run: nix develop .#ci -c ./scripts/ci/test-unit.sh
      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit
          if-no-files-found: warn
      - name: Upload unit coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage/unit/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

  int:
    name: Integration Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - uses: AtomiCloud/actions.setup-docker@v2
      - name: Run integration tests
        run: nix develop .#ci -c ./scripts/ci/test-int.sh
      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-int
          path: coverage/int
          if-no-files-found: warn
      - name: Upload integration coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage/int/lcov.info
          flags: int
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

  build:
    name: Build Validation
    runs-on: ubuntu-22.04
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - name: Build sample bundle
        run: nix develop .#ci -c ./scripts/ci/build.sh

  docker:
    name: Docker Image
    runs-on:
      - ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Docker
        run: ./scripts/ci/docker.sh
        env:
          LATEST_BRANCH: main
          DOMAIN: ghcr.io
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
          GITHUB_REPO_REF: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          CI_DOCKER_IMAGE: diene-bun-base
          CI_DOCKER_CONTEXT: .
          CI_DOCKERFILE: ./infra/Dockerfile
          CI_DOCKER_PLATFORM: linux/arm64,linux/amd64

  helm:
    name: Helm Chart
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - name: Build and Push Helm
        run: nix develop .#cd -c ./scripts/ci/helm.sh ./infra/root_chart
        env:
          DOMAIN: ghcr.io
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
          GITHUB_REPO_REF: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BRANCH: ${{ github.ref_name }}
