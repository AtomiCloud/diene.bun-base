name: ⚡ Reusable Build
on:
  workflow_call:
jobs:
  build:
    name: Build Validation
    runs-on: ubuntu-22.04
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          namespacelabs: false
      - name: Build sample bundle
        run: nix develop .#ci -c ./scripts/ci/build.sh
