name: ⚡ Reusable Integration Tests
on:
  workflow_call:
jobs:
  int:
    name: Integration Tests
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      # Integration tests start a throwaway Redis container via Testcontainers,
      # so the runner must expose a Docker daemon.
      - uses: AtomiCloud/actions.setup-docker@v2
      - name: Run integration tests
        run: nix develop .#ci -c ./scripts/ci/test-int.sh
      # Preserve coverage even if the gate above failed, so it is always uploadable.
      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-int
          path: coverage/int
          if-no-files-found: warn
      # Upload integration coverage to Codecov under its own flag. Non-blocking:
      # both `continue-on-error` and `fail_ci_if_error: false` keep an upload
      # failure from failing the job — the blocking gate is the local
      # test/coverage run above.
      - name: Upload integration coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage/int/lcov.info
          flags: int
          fail_ci_if_error: false
          disable_search: true
